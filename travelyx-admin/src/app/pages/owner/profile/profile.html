<div class="owner-profile">

  <!-- Info Card -->
  <div class="profile-card glass-panel">
    <div class="profile-avatar">{{ ownerName.charAt(0).toUpperCase() }}</div>
    <div class="profile-info">
      <h2>{{ ownerName || 'Propietario' }}</h2>
      <p class="role-badge">Propietario</p>
      <p class="email">{{ ownerEmail }}</p>
    </div>
  </div>

  <!-- Change Password -->
  <div class="section glass-panel">
    <h3>Cambiar Contraseña</h3>
    <p class="text-muted">Por seguridad, usa una contraseña de al menos 6 caracteres.</p>

    <div *ngIf="message" class="message-bar" [class.error]="isError" [class.success]="!isError">
      {{ message }}
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Contraseña Actual</label>
        <input type="password" class="input-field" [(ngModel)]="oldPassword" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input type="password" class="input-field" [(ngModel)]="newPassword" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmar Nueva Contraseña</label>
        <input type="password" class="input-field" [(ngModel)]="confirmPassword" placeholder="••••••••">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" (click)="changePassword()" [disabled]="isSaving">
        {{ isSaving ? 'Guardando...' : 'Actualizar Contraseña' }}
      </button>
    </div>
  </div>

</div>
